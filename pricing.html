<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revenza - Pricing</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; color: #222; background: #fff; }
.app { display: flex; flex-direction: column; min-height: 100vh; }
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 20px;
  min-height: 56px;
  border-bottom: 1px solid #eee;
  gap: 16px;
}
.brand { font-size: 20px; }
.nav { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
.nav a { text-decoration: none; color: #555; padding: 8px 10px; border-radius: 6px; }
.nav a.active { color: #534AB7; font-weight: 600; background: #f4f3ff; }
.main { width: 100%; padding: 28px 20px; }
h1 { margin-bottom: 12px; }
p { line-height: 1.6; margin-bottom: 10px; }
@media (max-width: 768px) {
  .header { align-items: flex-start; padding: 12px 14px; }
  .main { padding: 20px 14px; }
}
</style>
<style id="theme-toggle-styles">
.mode-toggle {
  position: relative;
  width: 54px;
  height: 30px;
  border: 1px solid #c9d9ea;
  background: #e8f1fb;
  border-radius: 999px;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  outline: none;
  padding: 0;
  font-size: 0;
  color: transparent;
  transition: background 0.22s ease, border-color 0.22s ease;
}
.mode-toggle::before {
  content: "";
  position: absolute;
  width: 22px;
  height: 22px;
  top: 3px;
  left: 3px;
  border-radius: 999px;
  background: #ffffff;
  box-shadow: 0 2px 7px rgba(0,0,0,0.18);
  transition: transform 0.22s ease;
}
.mode-toggle::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 999px;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.25);
}

body {
  transition: background-color 0.35s ease, color 0.35s ease, opacity 0.35s ease, transform 0.35s ease;
}
body.page-enter {
  opacity: 0;
  transform: translateY(8px);
}
body.page-ready {
  opacity: 1;
  transform: translateY(0);
}
body.page-switching {
  opacity: 0.92;
  transform: translateY(-4px);
}

.page-transition-overlay {
  position: fixed;
  inset: 0;
  display: grid;
  place-items: center;
  background: rgba(255, 255, 255, 0.72);
  backdrop-filter: blur(4px);
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}
.page-transition-overlay .inner {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(255, 255, 255, 0.92);
  border: 1px solid #d5e3f1;
  border-radius: 14px;
  padding: 10px 14px;
  color: #2b4b69;
  font-weight: 700;
}
.page-transition-overlay img {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  object-fit: contain;
}
body.page-switching .page-transition-overlay {
  opacity: 1;
  pointer-events: auto;
}

body.dark {
  background: #101010 !important;
  color: #e6edf7 !important;
}
body.dark .page-transition-overlay {
  background: rgba(16, 16, 16, 0.72);
}
body.dark .page-transition-overlay .inner {
  background: rgba(24, 24, 24, 0.94);
  border-color: #2f2f2f;
  color: #d4e0ef;
}
body.dark .mode-toggle {
  background: #2a3f58;
  border-color: #3a516c;
}
body.dark .mode-toggle::before {
  transform: translateX(24px);
  background: #dbe8f5;
}

body.dark .header,
body.dark .hero,
body.dark .card,
body.dark .panel,
body.dark .section-card,
body.dark .value-card,
body.dark .nav-card,
body.dark .builder-card,
body.dark .quote-card,
body.dark .glass-card,
body.dark .stat-card,
body.dark .side,
body.dark .side-nav,
body.dark .policy,
body.dark .policy section,
body.dark .toc,
body.dark .main,
body.dark .chip,
body.dark .story-intro,
body.dark .highlight-box,
body.dark .builders-section,
body.dark .last-updated,
body.dark .contact-chip {
  background: #1a1a1a !important;
  border-color: #2f2f2f !important;
  color: #dbe8f6 !important;
  box-shadow: none !important;
}
body.dark .builders-section { background: #141414 !important; }
body.dark .nav a,
body.dark .nav-links a,
body.dark .sidebar a,
body.dark .toc a,
body.dark .side a { color: #c8d6e7 !important; }
body.dark .nav a.active { background: #2b2b2b !important; color: #8bc0ff !important; }
body.dark p,
body.dark li,
body.dark small,
body.dark label,
body.dark .hero p,
body.dark .section-card p,
body.dark .brand-copy p,
body.dark .info p,
body.dark .quote,
body.dark .metric span,
body.dark .builder-role,
body.dark .policy p,
body.dark .policy li,
body.dark .policy h2,
body.dark .last-updated,
body.dark .last-updated strong { color: #c9d8e8 !important; }
body.dark h1,
body.dark h2,
body.dark h3,
body.dark strong,
body.dark .brand,
body.dark .company-name,
body.dark .policy h1 { color: #f2f7ff !important; }
body.dark input,
body.dark textarea {
  background: #121212 !important;
  border-color: #303030 !important;
  color: #e8f1fb !important;
}
</style>
</head>
<body>
<div class="app">
<header class="header">
  <div class="brand"><strong>Revenza</strong></div>
  <nav class="nav" aria-label="Primary navigation">
    <a href="index.html">Home</a>
    <a href="apps.html">Apps</a>
    <a href="kb.html">Knowledgebase</a>
    <a href="pricing.html" class="active">Pricing</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="privacy.html">Privacy Policy</a>
  
    <button id="mode-toggle" class="mode-toggle" type="button" aria-label="Toggle dark mode" aria-pressed="false"></button>
  </nav>
</header>
<main class="main">
  <h1>Pricing</h1>
  <p>Simple and transparent pricing details can be listed here.</p>
  <p>Add plan comparison, monthly/annual options, and feature limits for each tier.</p>
</main>
</div>
<script id="theme-toggle-script">
(function () {
  var key = 'revenza-theme';
  var body = document.body;
  var button = document.getElementById('mode-toggle');

  function ensureOverlay() {
    var overlay = document.getElementById('page-transition-overlay');
    if (overlay) return overlay;
    overlay = document.createElement('div');
    overlay.id = 'page-transition-overlay';
    overlay.className = 'page-transition-overlay';
    overlay.innerHTML = '<div class="inner"><img src="assets/upsell-logo.png" alt="Revenza logo"><span>Switching page ✨</span></div>';
    body.appendChild(overlay);
    return overlay;
  }

  function apply(theme) {
    var isDark = theme === 'dark';
    body.classList.toggle('dark', isDark);
    if (button) {
      button.setAttribute('aria-pressed', isDark ? 'true' : 'false');
      button.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
      button.title = isDark ? 'Switch to light mode ☀️' : 'Switch to dark mode 🌙';
    }
    try { localStorage.setItem(key, theme); } catch (e) {}
  }

  var saved = 'light';
  try { saved = localStorage.getItem(key) || 'light'; } catch (e) {}
  apply(saved);

  body.classList.add('page-enter');
  requestAnimationFrame(function () {
    requestAnimationFrame(function () {
      body.classList.add('page-ready');
      body.classList.remove('page-enter');
    });
  });

  if (button) {
    button.addEventListener('click', function () {
      apply(body.classList.contains('dark') ? 'light' : 'dark');
    });
  }

  ensureOverlay();
  var links = document.querySelectorAll('header .nav a[href$=".html"]');
  links.forEach(function (link) {
    link.addEventListener('click', function (e) {
      if (e.defaultPrevented) return;
      if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
      if (link.target && link.target !== '_self') return;

      var target = link.getAttribute('href');
      if (!target) return;
      if (target === window.location.pathname.split('/').pop()) return;

      e.preventDefault();
      body.classList.add('page-switching');
      setTimeout(function () {
        window.location.href = target;
      }, 220);
    });
  });
})();
</script>
</body>
</html>
