<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revenza - Pricing</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; color: #222; background: #fff; }
.app { display: flex; flex-direction: column; min-height: 100vh; }
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 20px;
  min-height: 56px;
  border-bottom: 1px solid #eee;
  gap: 16px;
}
.brand { font-size: 20px; }
.nav { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
.nav a { text-decoration: none; color: #555; padding: 8px 10px; border-radius: 6px; }
.nav a.active { color: #534AB7; font-weight: 600; background: #f4f3ff; }
.main { width: 100%; padding: 28px 20px; }
h1 { margin-bottom: 12px; }
p { line-height: 1.6; margin-bottom: 10px; }
@media (max-width: 768px) {
  .header { align-items: flex-start; padding: 12px 14px; }
  .main { padding: 20px 14px; }
}
</style>
<style id="theme-toggle-styles">
.mode-toggle {
  border: 1px solid #c9d9ea;
  background: #ffffff;
  color: #2a4a67;
  border-radius: 999px;
  padding: 8px 12px;
  font: inherit;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}
.mode-toggle:hover { background: #eef5fc; }

body.dark {
  background: #0f1724 !important;
  color: #e6edf7 !important;
}
body.dark .header,
body.dark .hero,
body.dark .card,
body.dark .panel,
body.dark .section-card,
body.dark .value-card,
body.dark .nav-card,
body.dark .builder-card,
body.dark .quote-card,
body.dark .glass-card,
body.dark .stat-card,
body.dark .side,
body.dark .side-nav,
body.dark .policy,
body.dark .toc,
body.dark .main,
body.dark .chip,
body.dark .story-intro,
body.dark .highlight-box,
body.dark .builders-section {
  background: #111b2a !important;
  border-color: #2a3a52 !important;
  color: #dbe8f6 !important;
  box-shadow: none !important;
}
body.dark .builders-section { background: #0b1320 !important; }
body.dark .nav a,
body.dark .nav-links a,
body.dark .sidebar a,
body.dark .toc a,
body.dark .side a { color: #b8c9dd !important; }
body.dark .nav a.active { background: #23344a !important; color: #8bc0ff !important; }
body.dark p,
body.dark li,
body.dark small,
body.dark label,
body.dark .hero p,
body.dark .section-card p,
body.dark .brand-copy p,
body.dark .info p,
body.dark .quote,
body.dark .metric span,
body.dark .builder-role { color: #b7c9dd !important; }
body.dark h1,
body.dark h2,
body.dark h3,
body.dark strong,
body.dark .brand,
body.dark .company-name { color: #e6f1ff !important; }
body.dark input,
body.dark textarea {
  background: #0c1420 !important;
  border-color: #2b3d56 !important;
  color: #e8f1fb !important;
}
body.dark .mode-toggle {
  background: #162234;
  border-color: #2f4159;
  color: #c8daf0;
}
body.dark .mode-toggle:hover { background: #1d2d44; }
</style>
</head>
<body>
<div class="app">
<header class="header">
  <div class="brand"><strong>Revenza</strong></div>
  <nav class="nav" aria-label="Primary navigation">
    <a href="index.html">Home</a>
    <a href="apps.html">Apps</a>
    <a href="kb.html">Knowledgebase</a>
    <a href="pricing.html" class="active">Pricing</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="privacy.html">Privacy Policy</a>
  
    <button id="mode-toggle" class="mode-toggle" type="button" aria-label="Toggle dark mode">Dark</button>
  </nav>
</header>
<main class="main">
  <h1>Pricing</h1>
  <p>Simple and transparent pricing details can be listed here.</p>
  <p>Add plan comparison, monthly/annual options, and feature limits for each tier.</p>
</main>
</div>
<script id="theme-toggle-script">
(function () {
  var key = 'revenza-theme';
  var body = document.body;
  var button = document.getElementById('mode-toggle');

  function apply(theme) {
    body.classList.toggle('dark', theme === 'dark');
    if (button) {
      button.textContent = theme === 'dark' ? 'Light' : 'Dark';
      button.setAttribute('aria-label', theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
    }
    try { localStorage.setItem(key, theme); } catch (e) {}
  }

  var saved = 'light';
  try { saved = localStorage.getItem(key) || 'light'; } catch (e) {}
  apply(saved);

  if (button) {
    button.addEventListener('click', function () {
      apply(body.classList.contains('dark') ? 'light' : 'dark');
    });
  }
})();
</script>
</body>
</html>
